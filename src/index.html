<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Product Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>
  <body class="page">
    <div
      class="card"
      data-qa="card"
    >
      <div class="card__image">
        <img
          src="images/imac.jpeg"
          alt="imac"
          width="160"
          height="134"
        />
      </div>

      <h2 class="card__title">
        APPLE A1419 iMac 27" Retina
        <br />

        5K Monoblock (MNED2UA/A)
      </h2>

      <p class="card__code">Product code: 195434</p>

      <div class="card__reviews">
        <div class="stars stars--4">
          <span class="stars__item"></span>
          <span class="stars__item"></span>
          <span class="stars__item"></span>
          <span class="stars__item"></span>
          <span class="stars__item"></span>
        </div>
        <span class="card__reviews-text">Reviews: 5</span>
      </div>

      <p class="card__price">
        <span class="card__price-label">Price:</span>
        $2,199
      </p>

      <a
        href="#"
        class="card__link"
        data-qa="hover"
      >
        BUY
      </a>
    </div>
  </body>
</html>
